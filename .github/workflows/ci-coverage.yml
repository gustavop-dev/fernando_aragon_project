name: CI test

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────────
  # Job 1: Backend coverage (pytest + coverage.py)
  # ──────────────────────────────────────────────────────────────────
  backend-coverage:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env for CI
        run: |
          cat > .env <<EOF
          DJANGO_ENV=testing
          DJANGO_SECRET_KEY=ci-test-secret-key-not-for-production
          DJANGO_DEBUG=true
          DJANGO_ALLOWED_HOSTS=localhost,127.0.0.1
          DJANGO_DB_ENGINE=django.db.backends.sqlite3
          DJANGO_DB_NAME=:memory:
          DJANGO_EMAIL_BACKEND=django.core.mail.backends.locmem.EmailBackend
          REDIS_URL=redis://localhost:6379/1
          EOF

      - name: Run migrations
        run: python manage.py migrate --no-input

      - name: Run tests with coverage
        run: |
          pytest \
            --cov=base_feature_app \
            --cov-report=json:coverage-reports/backend-coverage.json \
            --cov-report=term \
            -v

      - name: Upload backend coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-report
          path: backend/coverage-reports/backend-coverage.json
          retention-days: 30

  # ──────────────────────────────────────────────────────────────────
  # Job 2: Frontend unit coverage (vitest + v8)
  # ──────────────────────────────────────────────────────────────────
  frontend-unit-coverage:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.13.0'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: npx vitest run --coverage

      - name: Upload frontend unit coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-unit-report
          path: frontend/coverage/coverage-summary.json
          retention-days: 30

  # ──────────────────────────────────────────────────────────────────
  # Job 3: Frontend E2E coverage (Playwright + flow reporter)
  # ──────────────────────────────────────────────────────────────────
  frontend-e2e-coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Backend setup (Django API needed for E2E) ──
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Create backend .env for CI
        working-directory: backend
        run: |
          cat > .env <<EOF
          DJANGO_ENV=testing
          DJANGO_SECRET_KEY=ci-test-secret-key-not-for-production
          DJANGO_DEBUG=true
          DJANGO_ALLOWED_HOSTS=localhost,127.0.0.1
          DJANGO_CORS_ALLOWED_ORIGINS=http://localhost:5173,http://127.0.0.1:5173
          DJANGO_CSRF_TRUSTED_ORIGINS=http://localhost:5173,http://127.0.0.1:5173
          DJANGO_DB_ENGINE=django.db.backends.sqlite3
          DJANGO_DB_NAME=db.sqlite3
          DJANGO_EMAIL_BACKEND=django.core.mail.backends.locmem.EmailBackend
          REDIS_URL=redis://localhost:6379/1
          EOF

      - name: Run backend migrations
        working-directory: backend
        run: python manage.py migrate --no-input

      - name: Load fake data (if available)
        working-directory: backend
        run: |
          if python manage.py help load_fake_data > /dev/null 2>&1; then
            python manage.py load_fake_data
          else
            echo "No load_fake_data command found, skipping."
          fi

      - name: Start backend server
        working-directory: backend
        run: |
          python manage.py runserver 0.0.0.0:8000 &
          sleep 3
          curl -sf http://localhost:8000/api/ || echo "Backend health check: endpoint may not exist, continuing..."

      # ── Frontend setup ──
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.13.0'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Create frontend .env for CI
        working-directory: frontend
        run: |
          echo "VITE_API_URL=http://localhost:8000/api" > .env

      - name: Run E2E tests
        working-directory: frontend
        run: npx playwright test
        env:
          CI: true

      - name: Upload E2E flow coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-e2e-report
          path: |
            frontend/e2e-results/flow-coverage.json
            frontend/e2e-results/results.json
          retention-days: 30

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: frontend/playwright-report/
          retention-days: 14

  # ──────────────────────────────────────────────────────────────────
  # Job 4: Combined coverage report
  # ──────────────────────────────────────────────────────────────────
  coverage-summary:
    runs-on: ubuntu-latest
    needs: [backend-coverage, frontend-unit-coverage, frontend-e2e-coverage]
    if: always()
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Download backend coverage report
        uses: actions/download-artifact@v4
        with:
          name: backend-report
          path: reports/backend-report
        continue-on-error: true

      - name: Download frontend unit coverage report
        uses: actions/download-artifact@v4
        with:
          name: frontend-unit-report
          path: reports/frontend-unit-report
        continue-on-error: true

      - name: Download E2E coverage report
        uses: actions/download-artifact@v4
        with:
          name: frontend-e2e-report
          path: reports/frontend-e2e-report
        continue-on-error: true

      - name: Generate combined report
        env:
          REPORTS_DIR: reports
        run: python scripts/ci/combine-coverage-reports.py

      - name: Write Job Summary
        run: cat reports/coverage-report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Post PR comment
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: reports/coverage-report.md

      - name: Upload combined report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-summary-report
          path: reports/coverage-report.md
          retention-days: 30
